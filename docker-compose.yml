version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: web-sale-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: web-sale
    volumes:
      - mongodb_data:/data/db
    networks:
      - web-sale-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: web-sale-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/web-sale
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_refresh_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongodb
    networks:
      - web-sale-network
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: web-sale-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      - api
    networks:
      - web-sale-network
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_data:

networks:
  web-sale-network:
    driver: bridge

